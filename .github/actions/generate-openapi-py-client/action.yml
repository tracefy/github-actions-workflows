name: openapi python client generator
description: Generates python client library from openapi spec using openapi-python-client and datamodel-code-generator

inputs:
  bootstrap:
    description: whether to generate the initial client
    default: "false"
    required: false
  severity:
    description: the severity of the spec change to determine the version bump
    required: true
  client_name:
    description: the name of the client library
    required: true

runs:
  using: composite
  steps:
    - name: assert uv.lock is present
      shell: bash
      run: |
        # require uv.lock to be present in the repository
        [ -f uv.lock ] || (echo "uv.lock missing" 1>&2 && exit 1)

    - name: assert justfile is present
      shell: bash
      run: |
        # require justfile to be present in the repository
        [ -f justfile ] || (echo "justfile missing" 1>&2 && exit 1)

    - name: install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: install dependencies
      shell: bash
      run: |
        uv sync --group codegen

    - uses: extractions/setup-just@v3

    - name: Generate Python Client
      shell: bash
      run: |
        just generate-py

    - name: check for changes
      shell: bash
      run: |
        VERSION=$(jq -r '.["${{ inputs.output_dir }}"]' .release-please-manifest.json)

        git add ${{ inputs.output_dir }}

        if [[ "${{ inputs.bootstrap }}" == "true" ]]; then
          echo "Bootstrapping ${{ inputs.client_name }} at version $VERSION"
          git commit --allow-empty -m "chore: auto-generate ${{ inputs.client_name }}" -m "Release-As: $VERSION"
          exit 0
        fi

        if git diff --cached --quiet; then
          echo "No changes to ${{ inputs.client_name }}"
          exit 0
        fi

        CHANGE="${{ inputs.severity }}"
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

        if [[ "$CHANGE" -eq 0 ]]; then
          PATCH=$((PATCH + 1))
        elif [[ "$CHANGE" -eq 1 ]]; then
          MINOR=$((MINOR + 1))
          PATCH=0
        else
          MAJOR=$((MAJOR + 1))
          MINOR=0
          PATCH=0
        fi

        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
        echo "Bumping spec version from $VERSION -> $NEW_VERSION"

        git commit -m "chore: auto-generate ${{ inputs.client_name }}" -m "Release-As: $NEW_VERSION"

