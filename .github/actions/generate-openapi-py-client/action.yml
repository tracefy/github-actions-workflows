name: openapi python client generator
description: Generates python client library from openapi spec using openapi-python-client and datamodel-code-generator

inputs:
  bootstrap:
    description: whether to generate the initial client
    default: "false"
    required: false
  severity:
    description: the severity of the spec change to determine the version bump
    required: true
  client_name:
    description: the name of the client library
    required: true
  spec_file:
    description: the openapi spec file to use when generating the client
    required: false
    default: client/openapi.json
  config_file:
    description: the config file to use when generating the client
    required: true
  output_dir:
    description: the output directory for the client
    required: true
  custom_templates_dir:
    description: the custom Jinja templates to be used when generating the client
    required: true

runs:
  using: composite
  steps:
    - name: assert openapi spec is present
      shell: bash
      run: |
        [ -f ${{ inputs.spec_file }} ] || (echo "openapi spec is missing" 1>&2 && exit 1)

    - name: assert generator config is present
      shell: bash
      run: |
        [ -f ${{ inputs.config_file }} ] || (echo "generator config for ${{ inputs.client_name }} is missing" 1>&2 && exit 1)

    - name: Generate Python Client
      uses: openapi-generators/openapi-python-client-action@v2
      with:
        openapi-file: ${{ inputs.spec_file }}
        config-file: ${{ inputs.config_file }}
        extra-args: '--meta=uv, --custom-template-path=${{ inputs.custom_templates_dir }}, --output-path=${{ inputs.output_dir }}'

    - name: remove attr generated models
      shell: bash
      id: rm_models
      run: |
        models_dir="$(echo client/py/*/models)"
        rm -rf $models_dir/*
        echo "models_dir=$models_dir" >> "$GITHUB_OUTPUT"

    - uses: koxudaxi/datamodel-code-generator@0.55.0
      with:
        input: ${{inputs.spec_file}}
        output: "${{ steps.rm_models.outputs.models_dir }}/__init__.py"
        input-file-type: openapi
        output-model-type: pydantic_v2.BaseModel
        check: 'false'
        extras: 'ruff'
        extra-args: '--formatters ruff-format --formatters ruff-check --strict-nullable --use-default --use-default-kwargs --snake-case-field --capitalized-enum-members --use-annotated --use-decimal-for-multiple-of --field-constraints --use-union-operator --use-standard-collections --output-datetime-class datetime'

    - name: check for changes
      shell: bash
      run: |
        VERSION=$(jq -r '.["${{ inputs.output_dir }}"]' .release-please-manifest.json)

        git add ${{ inputs.output_dir }}

        if [[ "${{ inputs.bootstrap }}" == "true" ]]; then
          echo "Bootstrapping ${{ inputs.client_name }} at version $VERSION"
          git commit --allow-empty -m "chore: auto-generate ${{ inputs.client_name }}" -m "Release-As: $VERSION"
          exit 0
        fi

        if git diff --cached --quiet; then
          echo "No changes to ${{ inputs.client_name }}"
          exit 0
        fi

        CHANGE="${{ inputs.severity }}"
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

        if [[ "$CHANGE" -eq 0 ]]; then
          PATCH=$((PATCH + 1))
        elif [[ "$CHANGE" -eq 1 ]]; then
          MINOR=$((MINOR + 1))
          PATCH=0
        else
          MAJOR=$((MAJOR + 1))
          MINOR=0
          PATCH=0
        fi

        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
        echo "Bumping spec version from $VERSION -> $NEW_VERSION"

        git commit -m "chore: auto-generate ${{ inputs.client_name }}" -m "Release-As: $NEW_VERSION"

