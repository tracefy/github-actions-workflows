name: openapi typescript client generator
description: Generates typescript client library from openapi spec using @hey-api/openapi-ts

inputs:
  bootstrap:
    description: whether to generate the initial client
    default: "false"
    required: false
  severity:
    description: the severity of the spec change to determine the version bump
    required: true
  client_name:
    description: the name of the client library
    required: true
  output_dir:
    description: the output directory for the client
    required: true

runs:
  using: composite
  steps:
    - name: assert uv.lock is present
      working-directory: ${{ inputs.output_dir }}
      shell: bash
      run: |
        # require uv.lock to be present in the repository
        [ -f package-lock.json ] || (echo "package-lock.json missing" 1>&2 && exit 1)

    - uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: install dependencies
      working-directory: ${{ inputs.output_dir }}
      shell: bash
      run: |
        npm ci

    - name: Generate Typescript Client
      working-directory: ${{ inputs.output_dir }}
      shell: bash
      run: |
        npm run generate

    - name: check for changes
      shell: bash
      run: |
        VERSION=$(jq -r '.["${{ inputs.output_dir }}"]' .release-please-manifest.json)

        git add ${{ inputs.output_dir }}

        if [[ "${{ inputs.bootstrap }}" == "true" ]]; then
          echo "Bootstrapping ${{ inputs.client_name }} from version $VERSION"
          git commit --allow-empty -m "feat: initial auto-generate ${{ inputs.client_name }}"
          exit 0
        fi

        if git diff --cached --quiet; then
          echo "No changes to ${{ inputs.client_name }}"
          exit 0
        fi

        CHANGE="${{ inputs.severity }}"
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

        if [[ "$CHANGE" -eq 0 ]]; then
          PATCH=$((PATCH + 1))
        elif [[ "$CHANGE" -eq 1 ]]; then
          MINOR=$((MINOR + 1))
          PATCH=0
        else
          MAJOR=$((MAJOR + 1))
          MINOR=0
          PATCH=0
        fi

        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
        echo "Bumping spec version from $VERSION -> $NEW_VERSION"

        git commit -m "chore: auto-generate ${{ inputs.client_name }}" -m "Release-As: $NEW_VERSION"

