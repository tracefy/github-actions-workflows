name: Generate client libraries from OpenAPI spec

on:
  workflow_call:
    inputs:
      dry_run:
        type: boolean
        required: false
        default: true
      branch:
        type: string
        required: false
        default: master
    secrets:
      TRACEFY_GITHUB_APP_ID:
        required: true
      TRACEFY_GITHUB_APP_PRIVATE_KEY:
        required: true

permissions:
  contents: write

jobs:
  fastapi-codegen:
    runs-on: ubuntu-latest

    steps:
      - name: generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TRACEFY_GITHUB_APP_ID }}
          private-key: ${{ secrets.TRACEFY_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Checkout branch
        run: |
          git fetch origin ${{ inputs.branch }}
          git checkout ${{ inputs.branch }}
          git reset --hard origin/${{ inputs.branch }}

      - name: get spec change severity
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          COMPONENT="openapi"

          # Ensure tags are available (important for CI shallow clones)
          git fetch --tags --force >/dev/null 2>&1 || true

          # Get the two most recent openapi tags by semver
          mapfile -t TAGS < <(
            git tag --list "${COMPONENT}/*" --sort=-v:refname | head -n 2
          )

          if [[ "${#TAGS[@]}" -lt 2 ]]; then
            echo "Only 1 previous tag exists for openapi component"
            echo "bootstrap=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "bootstrap=false" >> $GITHUB_OUTPUT

          LATEST_TAG="${TAGS[0]}"
          PREVIOUS_TAG="${TAGS[1]}"

          # Strip prefix
          LATEST_VERSION="${LATEST_TAG#*/}"
          PREVIOUS_VERSION="${PREVIOUS_TAG#*/}"

          # Parse versions
          IFS='.' read -r LMAJOR LMINOR LPATCH <<< "$LATEST_VERSION"
          IFS='.' read -r PMAJOR PMINOR PPATCH <<< "$PREVIOUS_VERSION"

          # Determine bump
          if (( LMAJOR > PMAJOR )); then
            CHANGE=2
          elif (( LMINOR > PMINOR )); then
            CHANGE=1
          elif (( LPATCH > PPATCH )); then
            CHANGE=0
          else
            echo "No version increase between last openapi spec versions $PREVIOUS_VERSION and $LATEST_VERSION"
            exit 1
          fi

          echo "severity=$CHANGE" >> $GITHUB_OUTPUT

      - name: configure git
        run: |
          git config user.name "tracefy[bot]"
          git config user.email "tracefy[bot]@users.noreply.github.com"

      - name: generate python client
        uses: tracefy/github-actions-workflows/.github/actions/generate-openapi-client@v2
        with:
          generator: python
          bootstrap: ${{ steps.changelog.outputs.bootstrap }}
          severity: ${{ steps.changelog.outputs.severity }}
          client_name: client-py
          spec_file: client/openapi.json
          config_file: client/py/oag-config.yml
          output_dir: client/py

      - name: generate typescript client
        uses: tracefy/github-actions-workflows/.github/actions/generate-openapi-client@v2
        with:
          generator: typescript-axios
          bootstrap: ${{ steps.changelog.outputs.bootstrap }}
          severity: ${{ steps.changelog.outputs.severity }}
          client_name: client-ts
          spec_file: client/openapi.json
          config_file: client/ts/oag-config.yml
          output_dir: client/ts

      - name: list changes
        run: git log origin/${{ inputs.branch }}..HEAD

      - name: push changes
        if: ${{ !(inputs.dry_run || false) }}
        run: git push
