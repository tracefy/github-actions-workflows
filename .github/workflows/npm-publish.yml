name: npm publish
description: build and publish npm package to private registry

on:
  workflow_call:
    inputs:
      ref:
        type: string
        description: 'optional branch, tag, or commit to check out'
        required: false
        default: ''
      version:
        type: string
        description: "optional package version override (e.g. 1.3.3-alpha.20260421.153045)"
        required: false
        default: ''
      dir:
        type: string
        description: "which package to build and publish"
        required: false
        default: "."
      dry_run:
        type: boolean
        description: "whether to publish the package or not"
        required: false
        default: false
      aws-role-oid:
        type: string
        description: "the web identity role used to authenticate to aws"
        required: true
      aws-role-codeartifact:
        type: string
        description: "the role assumed after authenticating to generate the codeartifact authorization token"
        required: true
      codeartifact-repository:
        type: string
        description: "https://<domain>-<domain-owner>.d.codeartifact.<region>.amazonaws.com/{format}/{repository}/"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-node@v4

      - name: build and publish
        uses: tracefy/github-actions-workflows/.github/actions/publish-npm-package@v2
        with:
          version: ${{ inputs.version }}
          dir: ${{ inputs.dir }}
          dry_run: ${{ inputs.dry_run }}
          aws-role-oid: ${{ inputs.aws-role-oid }}
          aws-role-codeartifact: ${{ inputs.aws-role-codeartifact }}
          codeartifact-repository: ${{ inputs.codeartifact-repository }}
