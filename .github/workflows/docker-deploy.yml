name: deploy

on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
      service:
        type: string
        default: ${{ github.event.repository.name }}
      image_name:
        type: string
        default: ${{ github.event.repository.name }}
      skip_update:
        type: boolean
        default: false
    secrets:
      ssh_host:
        required: true
      ssh_private_key: # needs to be removed
        required: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: self-hosted
    env:
      IMAGE_REF: ghcr.io/tracefy/${{ inputs.image_name }}:${{ inputs.tag }}
    steps:
      - name: login to container registry
        run: |
          ssh ${{ secrets.ssh_host }} 'sudo su -c \
            "echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin"'

      - name: pull image
        run: |
          ssh ${{ secrets.ssh_host }} 'sudo docker pull ${{ env.IMAGE_REF }}'

      - name: update service
        if: ${{ inputs.skip_update == false }}
        run: |
          ssh ${{ secrets.ssh_host }} '
          sudo docker service update \
            --image=${{ env.IMAGE_REF }} \
            --with-registry-auth \
            --force \
            --detach=false \
            --update-parallelism=1 \
            --update-delay=2s \
            --update-failure-action=rollback \
            --update-order=start-first \
            default_${{ inputs.service }}'
