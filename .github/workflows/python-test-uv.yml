name: python-test-uv

on:
  workflow_call:
    inputs:
      require_typecheck:
        type: boolean
        default: false
      test_coverage_configured_internally:
        type: boolean
        default: false
      extra_packages:
        type: string
        default: ""
        description: "space seprated list of packages to install"
      aws-role-oid:
        type: string
        description: "the web identity role used to authenticate to aws"
        required: false
        default: "arn:aws:iam::225989361606:role/oidc-github-terraform"
      aws-role-codeartifact:
        type: string
        description: "the role assumed after authenticating to generate the codeartifact authorization token"
        required: false
        default: "arn:aws:iam::288761731503:role/github/code-artifact"
      codeartifact-domain:
        type: string
        description: "https://<domain>-<domain-owner>.d.codeartifact.<region>.amazonaws.com/"
        required: false
        default: "https://tracefy-288761731503.d.codeartifact.eu-central-1.amazonaws.com/"

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: generate codeartifact token
        id: codeartifact-token
        if: ${{ inputs.codeartifact-domain != ''  && inputs.aws-role-codeartifact != '' }}
        uses: tracefy/github-actions-workflows/.github/actions/aws-codeartifact-token@v2
        with:
          repository: ${{ inputs.codeartifact-domain }}
          aws-role-oid: ${{ inputs.aws-role-oid }}
          aws-role-ecr: ${{ inputs.aws-role-codeartifact }}

      - name: set credentials for private repository
        run: |
          echo "UV_INDEX_PRIVATE_REGISTRY_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_PRIVATE_REGISTRY_PASSWORD=${{ steps.codeartifact-token.outputs.AWS_CODEARTIFACT_TOKEN }}" >> $GITHUB_ENV

      - name: assert uv.lock is present
        shell: bash
        run: |
          # require uv.lock to be present in the repository
          [ -f uv.lock ] || (echo "uv.lock missing" 1>&2 && exit 1)

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: set up python
        run: uv python install

      - name: install extra packages
        if: ${{ inputs.extra_packages != '' }}
        shell: bash
        run: apt-get -y install ${{ inputs.extra_packages }}

      - name: install dependencies
        run: |
          uv sync --all-extras --dev --all-packages
          uv add --dev pytest pytest-cov coverage
          uv add --dev ruff
          uv add --dev basedpyright

      - name: format check
        run: uv run ruff format --check

      - name: lint
        run: uv run ruff check

      - name: typecheck
        continue-on-error: ${{ inputs.require_typecheck == false }}
        run: uv run basedpyright

      # https://docs.pytest.org/en/stable/reference/exit-codes.html
      - name: test
        shell: bash
        run: |
          if [[ "${{ inputs.test_coverage_configured_internally }}" == "true" ]]; then
            COV_OPTION="--cov"
          else
            COV_OPTION="--cov=src"
          fi

          uv run pytest $COV_OPTION --cov-report= --cov-branch || {
            exit_code=$?
            # allow exit code 0 (all pass) and 5 (no tests found)
            if [[ $exit_code -ne 0 && $exit_code -ne 5 ]]
            then
              exit $exit_code
            fi
            if [[ $exit_code -eq 5 ]]
            then
              rm .coverage
            fi
          }

      - name: coverage
        shell: bash
        run: |
          if [[ -f .coverage ]]
          then
            uv run coverage report
          fi
