name: build and push image

on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
      platforms:
        type: string
        default: linux/arm64
      push:
        type: boolean
        default: true
      disable-latest:
        type: boolean
        default: false
      ghcr-enabled:
        type: boolean
        default: true
      ecr-registry:
        type: string
        required: false
      ecr-repository:
        type: string
        required: false
      aws-oidc-role:
        type: string
        required: false
      aws-region:
        type: string
        default: eu-central-1
      aws-ecr-role:
        type: string
        required: false

env:
  REGISTRY_NAME: ghcr.io/tracefy/${{ github.event.repository.name }}
  DIGESTS_DIRECTORY: ./${{ github.sha }}/digests

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: [self-hosted]
    outputs:
      platforms: ${{ steps.vars.outputs.platforms }}
      ecr_name: ${{ steps.vars.outputs.ecr_name }}
    steps:
      - name: assert that both ecr input vars are set
        if: ${{ (inputs.ecr-registry != '' && inputs.ecr-repository == '') || (inputs.ecr-registry == '' && inputs.ecr-repository != '') }}
        run: echo "both ecr-registry and ecr-repository need to be specified to push to ecr" && exit 1

      - name: set variables
        id: vars
        env:
          PLATFORMS: ${{ inputs.platforms }}
          ECR_REPOSITORY: ${{ inputs.ecr-repository }}
          ECR_REGISTRY: ${{ inputs.ecr-registry }}
        run: |
          data=$(echo "\"${PLATFORMS}\"" | jq -c 'split(",") | map({ "name": ., "runner": (if . == "linux/amd64" then "X64" else "ARM64" end)})')
          echo "platforms=${data}" >> $GITHUB_OUTPUT
          echo "ecr_name=$ECR_REGISTRY/$ECR_REPOSITORY" >> $GITHUB_OUTPUT

      - name: cleanup
        uses: tracefy/github-actions-workflows/.github/actions/clean@v2
        if: always()


  # https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners
  # modified to also use appropiate runner depending on architecture/platform
  # if no runner exists that for the platform, then it defaults to using qemu on a arm64 runner
  build:
    runs-on: [self-hosted, "${{ matrix.platform.runner }}"]
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.prepare.outputs.platforms) }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set temporary docker config
        run: |
          mkdir -p "$PWD/${{ github.run_id }}/.docker"
          echo "DOCKER_CONFIG=$PWD/${{ github.run_id }}/.docker" >> $GITHUB_ENV

      - name: setup qemu
        uses: docker/setup-qemu-action@v3

      - name: setup buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: configure github role
        if: ${{ inputs.ecr-registry != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws-oidc-role }}
          aws-region: ${{ inputs.aws-region }}

      - name: configure ecr role
        if: ${{ inputs.ecr-registry != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws-ecr-role }}
          role-chaining: true
          aws-region: ${{ inputs.aws-region }}

      - name: login to ecr
        if: ${{ inputs.ecr-registry != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.ecr-registry }}

      - name: set variables
        id: vars
        env:
          ECR_NAME: ${{ needs.prepare.outputs.ecr_name }}
        run: |
          echo "artifact=digests-$(echo '${{ matrix.platform.name }}' | tr '/' '-')" >> $GITHUB_OUTPUT
          if [[ "${{ inputs.ecr-registry }}" != "" && "${{ inputs.ghcr-enabled }}" == "true" ]]; then
            echo "names=\"name=${ECR_NAME},${REGISTRY_NAME}\"" >> $GITHUB_OUTPUT
          elif [[ "${{ inputs.ecr-registry }}" != "" ]]; then
            echo "names=name=${ECR_NAME}" >> $GITHUB_OUTPUT
          else
            echo "names=name=${REGISTRY_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            name=${{ env.REGISTRY_NAME }},enable=${{ inputs.ghcr-enabled }}
            name=${{ steps.vars.outputs.ecr_name }},enable=${{ inputs.ecr-registry != '' }}

      - name: build image
        id: build
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          platforms: ${{ matrix.platform.name }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,${{ steps.vars.outputs.names }},push_by_digest=${{ inputs.push }},name-canonical=true,push=${{ inputs.push }}

      - name: export digests
        run: |
          mkdir -p "${DIGESTS_DIRECTORY}"
          digest='${{ steps.build.outputs.digest }}'
          touch "${DIGESTS_DIRECTORY}/${digest#sha256:}"

      # not possible to use output with matrix in this case
      # https://github.com/orgs/community/discussions/26639
      - name: upload digest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.artifact }}
          path: ${{ env.DIGESTS_DIRECTORY }}/*
          if-no-files-found: error
          retention-days: 1

      - name: cleanup
        uses: tracefy/github-actions-workflows/.github/actions/clean@v2
        if: always()

  push:
    runs-on: self-hosted
    if: ${{ inputs.push }}
    needs: [prepare, build]
    steps:
      - name: download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.DIGESTS_DIRECTORY }}
          pattern: digests-*
          merge-multiple: true

      - name: set temporary docker config
        run: |
          mkdir -p "$PWD/${{ github.run_id }}/.docker"
          echo "DOCKER_CONFIG=$PWD/${{ github.run_id }}/.docker" >> $GITHUB_ENV

      - name: setup buildx
        uses: docker/setup-buildx-action@v3

      - name: login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: configure github role
        if: ${{ inputs.ecr-registry != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws-oidc-role }}
          aws-region: ${{ inputs.aws-region }}

      - name: configure ecr role
        if: ${{ inputs.ecr-registry != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws-ecr-role }}
          role-chaining: true
          aws-region: ${{ inputs.aws-region }}

      - name: login to ecr
        if: ${{ inputs.ecr-registry != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.ecr-registry }}

      - name: docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            name=${{ env.REGISTRY_NAME }},enable=${{ inputs.ghcr-enabled }}
            name=${{ needs.prepare.outputs.ecr_name }},enable=${{ inputs.ecr-registry != '' }}
          tags: |
            type=raw,value=latest,enable=${{ inputs.disable-latest == false }}
            type=raw,value=${{ inputs.tag }},enable=${{ !contains(inputs.tag, '.') }}
            type=semver,pattern={{version}},value=${{ inputs.tag }},enable=${{ contains(inputs.tag, '.') }}
            type=semver,pattern={{major}},value=${{ inputs.tag }},enable=${{ contains(inputs.tag, '.') }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag }},enable=${{ contains(inputs.tag, '.') }}
            type=sha,enable=true,prefix=,suffix=,format=short
            type=sha,format=short,prefix={{branch}}-,suffix=-{{date 'YYYYMMDDHHmmss'}},enable={{is_default_branch}},priority=1

      - name: create manifest list and push to ghcr
        if: ${{ inputs.ghcr-enabled }}
        working-directory: ${{ env.DIGESTS_DIRECTORY }}
        run: |
          docker buildx imagetools create $(jq --arg name "$REGISTRY_NAME" -cr '.tags | unique | map(select(startswith($name))) | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_NAME }}@sha256:%s ' *)

      - name: create manifest list and push to ecr
        if: ${{ inputs.ecr-registry != '' }}
        working-directory: ${{ env.DIGESTS_DIRECTORY }}
        run: |
          docker buildx imagetools create $(jq --arg name "$REGISTRY_NAME" -cr '.tags | unique | map(select(startswith($name) | not)) | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ inputs.ecr-registry }}/${{ inputs.ecr-repository }}@sha256:%s ' *)

      - name: inspect ghcr image
        if: ${{ inputs.ghcr-enabled }}
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_NAME }}:${{ steps.meta.outputs.version }}

      - name: inspect ecr image
        if: ${{ inputs.ecr-registry != '' }}
        run: |
          docker buildx imagetools inspect ${{ inputs.ecr-registry }}/${{ inputs.ecr-repository }}:${{ steps.meta.outputs.version }}

      - name: cleanup
        uses: tracefy/github-actions-workflows/.github/actions/clean@v2
        if: always()
