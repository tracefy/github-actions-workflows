name: python publish uv
description: build and publish python package to private registry

on:
  workflow_call:
    inputs:
      ref:
        type: string
        description: 'optional branch, tag, or commit to check out'
        required: false
        default: ''
      version:
        type: string
        description: "optional package version override (e.g. 1.3.3-alpha.20260421.153045)"
        required: false
        default: ''
      dir:
        type: string
        description: "which package to build and publish"
        required: false
        default: "."
      dry_run:
        type: boolean
        description: "whether to publish the package or not"
        required: false
        default: false
      aws-role-oid:
        type: string
        description: "the web identity role used to authenticate to aws"
        required: true
      aws-role-codeartifact:
        type: string
        description: "the role assumed after authenticating to generate the codeartifact authorization token"
        required: true
      codeartifact-repository:
        type: string
        description: "https://<domain>-<domain-owner>.d.codeartifact.<region>.amazonaws.com/{format}/{repository}/"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  build-publish:
    runs-on: self-hosted
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: install uv
        uses: astral-sh/setup-uv@v7

      - name: extract codeartifact urls
        id: urls
        shell: bash
        run: |
          repo=${{ inputs.codeartifact-repository }}
          domain=$(echo "$repo" | awk -F/ '{print $1"//"$3}')
          echo "domain=$domain" >> $GITHUB_OUTPUT
          echo "check_url=${repo%/}/simple/" >> $GITHUB_OUTPUT

      - name: build and publish
        uses: tracefy/github-actions-workflows/.github/actions/publish-uv-package@v2
        with:
          version: ${{ inputs.version }}
          dir: ${{ inputs.dir }}
          dry_run: ${{ inputs.dry_run }}
          aws-role-oid: ${{ inputs.aws-role-oid }}
          aws-role-codeartifact: ${{ inputs.aws-role-codeartifact }}
          codeartifact-repository: ${{ inputs.codeartifact-repository }}
