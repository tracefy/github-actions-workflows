name: python publish uv
description: build and publish python package to private registry

on:
  workflow_call:
    inputs:
      ref:
        type: string
        description: 'optional branch, tag, or commit to check out'
        required: false
        default: ''
      dir:
        type: string
        description: "which package to build and publish"
        required: false
        default: "."
      dry_run:
        type: boolean
        description: "whether to publish the package or not"
        required: false
        default: false
      aws-role-oid:
        type: string
        description: "the web identity role used to authenticate to aws"
        required: true
      aws-role-codeartifact:
        type: string
        description: "the role assumed after authenticating to generate the codeartifact authorization token"
        required: true
      codeartifact-repository:
        type: string
        description: "https://<domain>-<domain-owner>.d.codeartifact.<region>.amazonaws.com/{format}/{repository}/"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  build-publish:
    runs-on: self-hosted
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: assert uv.lock is present
        shell: bash
        run: |
          # require uv.lock to be present in the repository
          [ -f uv.lock ] || (echo "uv.lock missing" 1>&2 && exit 1)

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: extract codeartifact urls
        id: urls
        shell: bash
        run: |
          repo=${{ inputs.codeartifact-repository }}
          echo "domain=${repo%%/*/*/*}" >> $GITHUB_OUTPUT
          echo "check_url=${repo%/}/simple/" >> $GITHUB_OUTPUT

      - name: generate codeartifact token
        id: codeartifact-token
        uses: tracefy/github-actions-workflows/.github/actions/aws-codeartifact-token@v2
        with:
          codeartifact-domain: ${{ steps.urls.outputs.domain }}
          aws-role-oid: ${{ inputs.aws-role-oid }}
          aws-role-codeartifact: ${{ inputs.aws-role-codeartifact }}

      - name: build
        shell: bash
        run: |
          uv build ${{ inputs.dir }}

      - name: publish
        if: ${{ !(inputs.dry_run || false) }}
        shell: bash
        env:
          UV_PUBLISH_USERNAME: aws
          UV_PUBLISH_PASSWORD: ${{ steps.codeartifact-token.outputs.AWS_CODEARTIFACT_TOKEN }}
          UV_PUBLISH_URL: ${{ inputs.codeartifact-repository }}
          UV_PUBLISH_CHECK_URL: ${{ steps.outputs.check_url }}
        run: |

          uv publish ${{ inputs.dir }}/dist/*

